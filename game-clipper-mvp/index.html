<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameClipper MVP | ゲーム配信切り抜きツール</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="hero">
    <div>
      <p class="badge">Game Stream Clipper MVP</p>
      <h1>ゲーム配信者向け<br>AI風・自動切り抜きツール</h1>
      <p class="lead">
        動画を読み込むと、音量が盛り上がった場面を自動検出して、切り抜き候補を作成します。
      </p>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>1. 動画を選択</h2>
      <input id="videoFile" type="file" accept="video/*" />
      <video id="video" controls></video>
    </section>

    <section class="card controls">
      <h2>2. 自動解析</h2>

      <div class="grid">
        <label>
          切り抜き秒数
          <input id="clipLength" type="number" value="30" min="10" max="120" />
        </label>

        <label>
          検出感度
          <select id="sensitivity">
            <option value="1.35">高い</option>
            <option value="1.6" selected>標準</option>
            <option value="2.0">低い</option>
          </select>
        </label>

        <label>
          最大候補数
          <input id="maxClips" type="number" value="10" min="1" max="30" />
        </label>
      </div>

      <button id="analyzeBtn" class="primary">盛り上がりシーンを検出</button>
      <p id="status" class="status">動画を選択してください。</p>
    </section>

    <section class="card">
      <h2>3. 切り抜き候補</h2>
      <div id="clips" class="clips"></div>
    </section>
  </main>

  <template id="clipTemplate">
    <article class="clip">
      <div>
        <h3 class="clipTitle"></h3>
        <p class="clipMeta"></p>
      </div>
      <div class="actions">
        <button class="previewBtn">プレビュー</button>
        <button class="exportBtn">MP4書き出し</button>
      </div>
    </article>
  </template>

  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
  <script src="./script.js"></script>
</body>
</html>
